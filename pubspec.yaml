# Application name and description
name: producty
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  intl: ^0.19.0
  uuid: ^4.2.2
  shared_preferences: ^2.2.2
  flutter_svg: ^2.0.9
  # Icon packages for UI elements
  iconsax_flutter: ^1.0.0
  google_fonts: ^6.1.0
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.2
  font_awesome_flutter: ^10.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/logo.png
    - assets/images/icon.png
    - assets/images/darkLogo.svg
    - assets/images/lightLogo.svg
    - assets/images/intro1.svg
    - assets/images/intro2.svg
    - assets/images/intro3.svg
    - assets/images/intro4.svg

# App icon configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  # Light and dark mode icons for iOS
  image_path_ios: "assets/images/lighticon.png"
  dark_image_path_ios: "assets/images/darkicon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/icon.png"
  windows:
    generate: true
    image_path: "assets/images/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/icon.png"
