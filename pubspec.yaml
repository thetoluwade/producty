# Application name and description
name: producty
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  iconsax_flutter: ^1.0.0
  font_awesome_flutter: ^10.6.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  syncfusion_flutter_calendar: ^23.2.7  # Downgraded to stable version
  intl: ^0.18.1
  uuid: ^4.2.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/intro1.svg
    - assets/images/intro2.svg
    - assets/images/intro3.svg
    - assets/images/intro4.svg
    - assets/animations/
    - assets/images/logo.png
    - assets/images/icon.png
    - assets/images/darkLogo.svg
    - assets/images/lightLogo.svg

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
